<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>วงล้อล็อกผล</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        background: #f5f5f0;
        display: flex;
        justify-content: center;
        padding: 32px 16px;
        min-height: 100vh;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        max-width: 480px;
        width: 100%;
      }
      h1 {
        font-size: 18px;
        font-weight: 500;
        color: #1a1a1a;
      }
      .prize-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .prize-chip {
        font-size: 12px;
        padding: 4px 12px;
        border-radius: 999px;
        border: 0.5px solid #ccc;
        background: #fff;
        color: #555;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .prize-chip.active {
        background: #1a1a1a;
        color: #fff;
        border-color: transparent;
        font-weight: 500;
      }
      .prize-chip.done {
        background: #d4f0e0;
        color: #1a7a45;
        border-color: transparent;
        cursor: default;
      }
      .canvas-wrap {
        position: relative;
        width: 300px;
        height: 300px;
      }
      .needle-wrap {
        position: absolute;
        top: -8px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
      }
      .needle-body {
        width: 0;
        height: 0;
        border-left: 10px solid transparent;
        border-right: 10px solid transparent;
        border-top: 28px solid #1a1a1a;
        margin: 0 auto;
      }
      .center-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        z-index: 10;
        transition: transform 0.1s;
      }
      .center-dot:active {
        transform: translate(-50%, -50%) scale(0.92);
      }
      .result-area {
        text-align: center;
        min-height: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .result-rank {
        font-size: 12px;
        color: #888;
        min-height: 18px;
      }
      .result-name {
        font-size: 28px;
        font-weight: 500;
        color: #1a1a1a;
        min-height: 36px;
      }
      .btn-row {
        display: flex;
        gap: 8px;
      }
      button {
        font-size: 13px;
        padding: 7px 20px;
        cursor: pointer;
        border-radius: 8px;
        border: 0.5px solid #ccc;
        background: #fff;
        color: #1a1a1a;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      button:hover {
        background: #f0f0ec;
      }
      button:active {
        transform: scale(0.97);
      }
      button.primary {
        background: #1a1a1a;
        color: #fff;
        border-color: transparent;
      }
      button.primary:hover {
        background: #333;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      .no-config {
        font-size: 13px;
        color: #aaa;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>&#127381; วงล้อ Deep & Harmonicare IVF Clinic</h1>

      <div class="prize-row" id="prizeRow"></div>

      <div class="canvas-wrap">
        <div class="needle-wrap"><div class="needle-body"></div></div>
        <canvas id="wc" width="300" height="300"></canvas>
        <div class="center-dot" id="centerBtn"></div>
      </div>

      <div class="result-area">
        <div class="result-rank" id="resultRank"></div>
        <div class="result-name" id="resultName">—</div>
      </div>

      <div class="btn-row">
        <button class="primary" id="spinBtn">&#8635; หมุน</button>
        <button id="nextBtn" style="display: none">รางวัลถัดไป &#8594;</button>
      </div>

      <div class="no-config" id="noConfig" style="display: none">
        ยังไม่ได้ตั้งค่า — เปิด admin.html ก่อนนะครับ
      </div>
    </div>

    <script>
      const FILLS = [
        "#EEEDFE",
        "#E1F5EE",
        "#FAECE7",
        "#FBEAF0",
        "#E6F1FB",
        "#EAF3DE",
        "#FAEEDA",
        "#FCEBEB",
        "#F1EFE8",
      ];
      const TEXTS = [
        "#3C3489",
        "#085041",
        "#712B13",
        "#72243E",
        "#0C447C",
        "#27500A",
        "#633806",
        "#791F1F",
        "#444441",
      ];
      const RANK_LABELS = [
        "&#127881; รางวัลที่ 1",
        "&#127882; รางวัลที่ 2",
        "&#127883; รางวัลที่ 3",
      ];

      let items = JSON.parse(localStorage.getItem("wheelItems") || "[]");
      let prizes = JSON.parse(
        localStorage.getItem("wheelPrizes") || '["","",""]',
      );
      let donePrizes = [];
      let currentPrizeIdx = 0;
      let angle = 0,
        spinning = false;

      const canvas = document.getElementById("wc");
      const ctx = canvas.getContext("2d");

      function color(i) {
        return { fill: FILLS[i % FILLS.length], text: TEXTS[i % TEXTS.length] };
      }

      function draw(a) {
        const cx = 150,
          cy = 150,
          r = 148,
          n = items.length;
        ctx.clearRect(0, 0, 300, 300);
        if (!n) return;
        const sl = (Math.PI * 2) / n;
        items.forEach((item, i) => {
          const s = a + i * sl,
            e = s + sl,
            c = color(i);
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, s, e);
          ctx.closePath();
          ctx.fillStyle = c.fill;
          ctx.fill();
          ctx.strokeStyle = "#fff";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(s + sl / 2);
          ctx.textAlign = "right";
          ctx.fillStyle = c.text;
          ctx.font = `500 ${Math.min(13, 100 / Math.max(item.length, 3))}px sans-serif`;
          ctx.fillText(item, r - 10, 5);
          ctx.restore();
        });
        ctx.beginPath();
        ctx.arc(cx, cy, 22, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
      }

      function getIdxAt(a) {
        const sl = (Math.PI * 2) / items.length;
        let rel =
          (((-Math.PI / 2 - a) % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        return Math.floor(rel / sl) % items.length;
      }

      function renderPrizeRow() {
        const row = document.getElementById("prizeRow");
        row.innerHTML = "";
        prizes.forEach((p, i) => {
          if (!p) return;
          const chip = document.createElement("div");
          chip.className =
            "prize-chip" +
            (donePrizes.includes(i)
              ? " done"
              : i === currentPrizeIdx
                ? " active"
                : "");
          chip.innerHTML =
            (donePrizes.includes(i) ? "&#10003; " : "") +
            RANK_LABELS[i].replace(/&#\d+;/g, (m) =>
              String.fromCodePoint(parseInt(m.slice(2, -1))),
            ) +
            (p ? ` (${p})` : "");
          if (!donePrizes.includes(i))
            chip.onclick = () => {
              currentPrizeIdx = i;
              renderPrizeRow();
            };
          row.appendChild(chip);
        });
      }

      function spin() {
        if (spinning || items.length < 1) return;
        const target = prizes[currentPrizeIdx];
        const forcedIdx = target ? items.indexOf(target) : -1;
        if (target && forcedIdx === -1) {
          alert(`"${target}" ไม่มีในวงล้อ กรุณาตรวจสอบ admin.html`);
          return;
        }
        spinning = true;
        document.getElementById("spinBtn").disabled = true;
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("resultName").textContent = "—";
        document.getElementById("resultRank").innerHTML = "";

        const startAngle = angle;
        let finalAngle;
        if (forcedIdx >= 0) {
          const sl = (Math.PI * 2) / items.length;
          const base = -Math.PI / 2 - (forcedIdx * sl + sl / 2);
          finalAngle = base + (6 + Math.floor(Math.random() * 4)) * Math.PI * 2;
        } else {
          finalAngle = startAngle + (5 + Math.random() * 5) * Math.PI * 2;
        }

        const duration = 3500;
        const diff = finalAngle - startAngle;
        const start = performance.now();
        function easeOut(t) {
          return 1 - Math.pow(1 - t, 3.5);
        }
        function frame(now) {
          const t = Math.min((now - start) / duration, 1);
          angle = startAngle + diff * easeOut(t);
          draw(angle);
          if (t < 1) {
            requestAnimationFrame(frame);
          } else {
            angle = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            spinning = false;
            const idx = getIdxAt(angle);
            document.getElementById("resultRank").innerHTML =
              RANK_LABELS[currentPrizeIdx];
            document.getElementById("resultName").textContent = items[idx];
            document.getElementById("spinBtn").disabled = false;
            donePrizes.push(currentPrizeIdx);

            // ลบคน/รายการที่ถูกรางวัลออกจากวงล้อ
            items.splice(idx, 1);
            localStorage.setItem('wheelItems', JSON.stringify(items));

            // ถ้ายังเหลือ item ให้วาดใหม่
            if (items.length > 0) {
              draw(angle);
            } else {
              ctx.clearRect(0, 0, 300, 300);
            }

            const remaining = prizes
              .map((p, i) => (p ? i : -1))
              .filter((i) => i >= 0 && !donePrizes.includes(i));
            if (remaining.length > 0) {
              currentPrizeIdx = remaining[0];
              document.getElementById("nextBtn").style.display = "";
            }
            renderPrizeRow();
          }
        }
        requestAnimationFrame(frame);
      }

      document.getElementById("nextBtn").addEventListener("click", () => {
        document.getElementById("resultName").textContent = "—";
        document.getElementById("resultRank").innerHTML = "";
        document.getElementById("nextBtn").style.display = "none";
      });

      document.getElementById("spinBtn").addEventListener("click", spin);
      document.getElementById("centerBtn").addEventListener("click", spin);

      if (!items.length) {
        document.getElementById("noConfig").style.display = "";
        document.getElementById("spinBtn").disabled = true;
      } else {
        currentPrizeIdx = prizes.findIndex((p) => p);
        if (currentPrizeIdx === -1) currentPrizeIdx = 0;
        renderPrizeRow();
        draw(angle);
      }
    </script>
  </body>
</html>
